<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#0891b2"/>
  <rect width="100" height="100" rx="22" fill="url(#g)"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <!-- Fish body -->
  <ellipse cx="45" cy="50" rx="22" ry="13" fill="white" opacity="0.95"/>
  <!-- Tail -->
  <polygon points="67,50 80,38 80,62" fill="white" opacity="0.9"/>
  <!-- Eye -->
  <circle cx="32" cy="46" r="3.5" fill="#0891b2"/>
  <circle cx="31" cy="45" r="1.2" fill="white"/>
  <!-- Fin -->
  <ellipse cx="48" cy="40" rx="9" ry="5" fill="white" opacity="0.6" transform="rotate(-20 48 40)"/>
</svg>
